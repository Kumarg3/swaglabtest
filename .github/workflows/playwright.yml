name: Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    name: Run Playwright Tests
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test
        continue-on-error: true

      - name: Organize videos
        if: always()
        run: npx ts-node organizeVideos.ts

      - name: Archive reports
        if: always()
        run: npx ts-node archiveReports.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: Screenshots/
          retention-days: 30

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: Videos/
          retention-days: 30

      - name: Upload archived reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archived-reports
          path: Reports/
          retention-days: 90

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action/composite@v2
        with:
          files: |
            playwright-report/results.json
          check_name: Playwright Test Results
          comment_mode: always

      - name: Comment PR with test summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read test report summary if available
            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'playwright-report');
            let summary = '## Playwright Test Results\n\n';
            
            if (fs.existsSync(reportPath)) {
              summary += '✅ Tests completed. View the full report in Artifacts.\n\n';
              summary += '**Artifacts:**\n';
              summary += '- 📊 Playwright Report (HTML)\n';
              summary += '- 📸 Screenshots\n';
              summary += '- 🎥 Videos\n';
            } else {
              summary += '⚠️ Test execution completed. Check job logs for details.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
