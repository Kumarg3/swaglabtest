name: Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    name: Run Playwright Tests
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test
        continue-on-error: true

      - name: Organize videos
        if: always()
        run: npx ts-node organizeVideos.ts

      - name: Archive reports
        if: always()
        run: npx ts-node archiveReports.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results.json
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: Screenshots/
          retention-days: 30

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: Videos/
          retention-days: 30

      - name: Upload archived reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archived-reports
          path: Reports/
          retention-days: 90

      - name: Extract test results and comment PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Check if HTML report exists
            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'playwright-report', 'index.html');
            let summary = '## Playwright Test Results\n\n';
            
            if (fs.existsSync(reportPath)) {
              summary += '✅ **Tests Completed Successfully**\n\n';
              summary += '### 📊 Artifacts Available:\n';
              summary += '- **[Playwright HTML Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})** - View in Actions artifacts\n';
              summary += '- **Screenshots** - All test point screenshots\n';
              summary += '- **Videos** - Full test execution videos\n';
              summary += '- **Archived Reports** - Historical test data\n\n';
              summary += '### Instructions:\n';
              summary += '1. Go to the [Actions tab](https://github.com/${{ github.repository }}/actions)\n';
              summary += '2. Find this workflow run\n';
              summary += '3. Download the `playwright-report` artifact\n';
              summary += '4. Extract and open `index.html` in your browser\n';
            } else {
              summary += '⚠️ **Test Execution Completed**\n\n';
              summary += 'Please check the job logs for details. Artifacts are available in the Actions tab.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Mark PR status
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const reportPath = require('path').join(process.env.GITHUB_WORKSPACE, 'playwright-report', 'index.html');
            const fs = require('fs');
            
            if (fs.existsSync(reportPath)) {
              core.setOutput('result', 'success');
            } else {
              core.warning('Playwright report not found');
            }
